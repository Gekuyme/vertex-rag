services:
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      API_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://vertex:vertex@postgres:5432/vertex_rag?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-false}
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    ports:
      - "${WORKER_PORT:-8082}:8082"
    environment:
      WORKER_PORT: 8082
      DATABASE_URL: ${DATABASE_URL:-postgres://vertex:vertex@postgres:5432/vertex_rag?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vertex_rag}
      POSTGRES_USER: ${POSTGRES_USER:-vertex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vertex}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
