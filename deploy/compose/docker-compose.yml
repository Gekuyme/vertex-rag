services:
  web:
    image: ${VERTEX_WEB_IMAGE:-ghcr.io/vertex-rag/vertex-rag-web:latest}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api

  api:
    image: ${VERTEX_API_IMAGE:-ghcr.io/vertex-rag/vertex-rag-api:latest}
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      API_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://vertex:vertex@postgres:5432/vertex_rag?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_RETRIEVAL_TTL: ${CACHE_RETRIEVAL_TTL:-10m}
      CACHE_ANSWER_TTL: ${CACHE_ANSWER_TTL:-10m}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL_GEMINI: ${EMBED_MODEL_GEMINI:-gemini-embedding-001}
      LLM_MODEL_OPENAI: ${LLM_MODEL_OPENAI:-gpt-4o-mini}
      LLM_MODEL_OPENAI_STRICT: ${LLM_MODEL_OPENAI_STRICT:-}
      LLM_MODEL_OPENAI_UNSTRICT: ${LLM_MODEL_OPENAI_UNSTRICT:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      LLM_MODEL_GEMINI: ${LLM_MODEL_GEMINI:-gemini-2.5-flash-lite}
      LLM_MODEL_GEMINI_STRICT: ${LLM_MODEL_GEMINI_STRICT:-}
      LLM_MODEL_GEMINI_UNSTRICT: ${LLM_MODEL_GEMINI_UNSTRICT:-}
      EMBED_MODEL_OPENAI: ${EMBED_MODEL_OPENAI:-text-embedding-3-small}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      LLM_OLLAMA_BASE_URL: ${LLM_OLLAMA_BASE_URL:-}
      LLM_OLLAMA_BASE_URL_STRICT: ${LLM_OLLAMA_BASE_URL_STRICT:-}
      LLM_OLLAMA_BASE_URL_UNSTRICT: ${LLM_OLLAMA_BASE_URL_UNSTRICT:-}
      LLM_MODEL_OLLAMA: ${LLM_MODEL_OLLAMA:-llama3.2}
      LLM_MODEL_OLLAMA_STRICT: ${LLM_MODEL_OLLAMA_STRICT:-}
      LLM_MODEL_OLLAMA_UNSTRICT: ${LLM_MODEL_OLLAMA_UNSTRICT:-}
      LLM_OLLAMA_NUM_CTX: ${LLM_OLLAMA_NUM_CTX:-4096}
      LLM_OLLAMA_KEEP_ALIVE: ${LLM_OLLAMA_KEEP_ALIVE:-30m}
      EMBED_MODEL_OLLAMA: ${EMBED_MODEL_OLLAMA:-nomic-embed-text}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-false}
      SEARCH_API_PROVIDER: ${SEARCH_API_PROVIDER:-brave}
      SEARCH_API_KEY: ${SEARCH_API_KEY:-}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-5}
      SEARCH_HTTP_TIMEOUT: ${SEARCH_HTTP_TIMEOUT:-6s}
      RETRIEVAL_PIPELINE_VERSION: ${RETRIEVAL_PIPELINE_VERSION:-v2}
      QUERY_REWRITE_ENABLED: ${QUERY_REWRITE_ENABLED:-true}
      QUERY_EXPANSION_ENABLED: ${QUERY_EXPANSION_ENABLED:-true}
      HYDE_ENABLED: ${HYDE_ENABLED:-false}
      SPARSE_SEARCH_PROVIDER: ${SPARSE_SEARCH_PROVIDER:-opensearch}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-vertex-document-chunks}
      SPARSE_SEARCH_TIMEOUT: ${SPARSE_SEARCH_TIMEOUT:-4s}
      SPARSE_SEARCH_MAX_RESULTS: ${SPARSE_SEARCH_MAX_RESULTS:-50}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_URL: ${RERANKER_URL:-http://reranker:80}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANKER_TIMEOUT: ${RERANKER_TIMEOUT:-8s}
      RERANKER_MAX_RESULTS: ${RERANKER_MAX_RESULTS:-30}
      UNSTRICT_LEGACY_TOGGLE_WEB_SEARCH: ${UNSTRICT_LEGACY_TOGGLE_WEB_SEARCH:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: ${VERTEX_WORKER_IMAGE:-ghcr.io/vertex-rag/vertex-rag-worker:latest}
    ports:
      - "${WORKER_PORT:-8082}:8082"
    environment:
      WORKER_PORT: 8082
      DATABASE_URL: ${DATABASE_URL:-postgres://vertex:vertex@postgres:5432/vertex_rag?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBED_MODEL_GEMINI: ${EMBED_MODEL_GEMINI:-gemini-embedding-001}
      EMBED_MODEL_OPENAI: ${EMBED_MODEL_OPENAI:-text-embedding-3-small}
      EMBED_MODEL_OLLAMA: ${EMBED_MODEL_OLLAMA:-nomic-embed-text}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-vertex-rag}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      SPARSE_SEARCH_PROVIDER: ${SPARSE_SEARCH_PROVIDER:-opensearch}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-vertex-document-chunks}
      SPARSE_SEARCH_TIMEOUT: ${SPARSE_SEARCH_TIMEOUT:-4s}
      SPARSE_INDEX_ENABLED: ${SPARSE_INDEX_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vertex_rag}
      POSTGRES_USER: ${POSTGRES_USER:-vertex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vertex}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command:
      - --model-id
      - ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - --port
      - "80"
    ports:
      - "8083:80"
    profiles:
      - local-llm

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  ollama_data:
