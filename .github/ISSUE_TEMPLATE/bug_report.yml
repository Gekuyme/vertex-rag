name: Bug report
description: Report a defect, regression, or reliability issue in Vertex RAG
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce the issue
      placeholder: |
        1. Start the stack with ...
        2. Upload ...
        3. Send query ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - web
        - api
        - worker
        - retrieval
        - ingestion
        - auth / roles
        - docs
        - deployment
        - ci
        - other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Include commit, provider settings, deployment mode, and OS if relevant
      placeholder: |
        Commit:
        LLM provider:
        Embed provider:
        Docker or local:
        OS:
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste the relevant snippets only
      render: shell
